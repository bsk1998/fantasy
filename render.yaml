services:
  - type: web
    name: fantasy-boulzazen-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fantasy_wc2026.db
      - key: SUPABASE_JWT_SECRET
        value: ""
      - key: GROQ_API_KEY
        value: ""
      - key: ALLOWED_ORIGINS
        value: https://votre-frontend.vercel.app
